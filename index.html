<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Promoter Submission</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { margin-top: 15px; padding: 10px; text-align: center; display: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Promoter Data Entry</h2>
    <form id="dataForm">
        <label>Promoter Name</label>
        <input type="text" id="promoter" required>
        
        <label>Dealer</label>
        <input type="text" id="dealer" required>

        <label>Segment</label>
        <select id="segment">
            <option>Split AC</option>
            <option>Window AC</option>
            <option>Inverter AC</option>
        </select>

        <input type="text" id="compBrand" placeholder="Competition Brand" required>
        <input type="text" id="modelNum" placeholder="Model Number" required>
        <input type="number" id="price" placeholder="Best Customer Price (₹)" required>
        <input type="text" id="capacity" placeholder="Cooling Capacity" required>
        <input type="number" step="0.01" id="iseer" placeholder="ISEER" required>

        <button type="submit" id="submitBtn">Submit Data</button>
    </form>
    <div id="status" class="status"></div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbycNIF0Eq7BSuYY5lbn75bN6R2PhGYyF9knAvo_B7b6Z250oN-44DJorftedp3ZJqb4sw/exec';

    document.getElementById('dataForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = 'block';
        status.style.background = '#eee';
        status.innerText = "Sending data...";

        const payload = {
            promoter: document.getElementById('promoter').value,
            dealer: document.getElementById('dealer').value,
            segment: document.getElementById('segment').value,
            compBrand: document.getElementById('compBrand').value,
            modelNum: document.getElementById('modelNum').value,
            price: document.getElementById('price').value,
            capacity: document.getElementById('capacity').value,
            iseer: document.getElementById('iseer').value
        };

        try {
            // Using 'text/plain' helps avoid pre-flight OPTIONS issues with Apps Script
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });

            status.style.background = '#d4edda';
            status.innerText = "Submission Sent! Check your sheet.";
            document.getElementById('dataForm').reset();
        } catch (err) {
            status.style.background = '#f8d7da';
            status.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
