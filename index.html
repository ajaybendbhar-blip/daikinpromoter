<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promoter Competition Submission</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f6f2; }
    .wrap { max-width: 820px; margin: auto; padding: 16px; }
    .box { background: #fff; border: 1px solid #ddd; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
    h1, h2 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input, select, textarea, button {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box;
    }
    textarea { min-height: 80px; }
    button { background: #01696f; color: white; border: none; font-weight: bold; cursor: pointer; }
    .danger { background: #f4dce0; color: #8b1e2d; }
    .row { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .msg { display:none; padding:12px; border-radius:12px; margin-bottom:12px; }
    .ok { display:block; background:#e6f6f3; color:#0a4f54; }
    .err { display:block; background:#f9e4e8; color:#8b1e2d; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <h1>Promoter Competition Submission</h1>
    <div id="msg" class="msg"></div>
  </div>

  <form id="mainForm" method="POST" action="https://script.google.com/macros/s/PASTE_YOUR_EXEC_URL_HERE/exec">
    <div class="box">
      <h2>One-time basic details</h2>
      <div class="grid">
        <input name="promoter" id="promoter" placeholder="Promoter Name" required>
        <input name="employeeCode" id="employeeCode" placeholder="Promoter Employee Code" required>
        <input name="storeName" id="storeName" placeholder="Store Name" required>
        <input name="storeCode" id="storeCode" placeholder="Store Code" required>
        <select name="dealerCategory" id="dealerCategory" required>
          <option value="">Dealer Category</option>
          <option>NR</option>
          <option>GT</option>
          <option>DSP</option>
        </select>
        <input name="storeCity" id="storeCity" placeholder="Store City" required>
        <textarea name="storeAddress" id="storeAddress" placeholder="Store Address" style="grid-column:1/-1;" required></textarea>
      </div>
    </div>

    <div class="box">
      <h2>Segment entry</h2>
      <div class="grid">
        <select name="segment" id="segment" required>
          <option>1T 3*</option>
          <option>1.5T 3*</option>
          <option>1T 5*</option>
          <option>1.5T 5*</option>
        </select>
        <select name="brand" id="brand" required>
          <option value="">Brand</option>
          <option>Daikin</option>
          <option>LG</option>
          <option>Voltas</option>
          <option>Bluestar</option>
          <option>Hitachi</option>
          <option>Panasonic</option>
          <option>Llyod</option>
        </select>
        <input name="model" id="model" placeholder="Model Number" required>
        <input name="price" id="price" type="number" placeholder="Best Customer Price" required>
      </div>
    </div>

    <div class="box">
      <h2>Display details</h2>
      <div class="grid">
        <input name="daikinDisplay" id="daikinDisplay" type="number" placeholder="Daikin Total Display" required>
        <input name="storeDisplay" id="storeDisplay" type="number" placeholder="Store Total Display" required>
      </div>
    </div>

    <div class="box">
      <button type="submit">Final Submit</button>
    </div>
  </form>
</div>
</body>
</html>
